<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack - Pro</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #50c878; --text: #ffffff; --danger: #e57373; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1, h2 { color: var(--accent); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .supp-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .check-big { width: 30px; height: 30px; accent-color: var(--accent); }
        .btn { background: var(--accent); border: none; padding: 10px; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-del { background: #444; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.8em; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .stock-warn { color: var(--danger); font-weight: bold; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1>HealthTrack</h1>
    
    <!-- Formulário para Adicionar -->
    <div class="card">
        <h3>Adicionar Item</h3>
        <input type="text" id="name" placeholder="Nome (ex: Ferro, Vitamina D)">
        <input type="text" id="dose" placeholder="Dosagem (ex: 500mg, 1 cap)">
        <input type="number" id="stock" placeholder="Quantidade inicial no pote">
        <button class="btn" onclick="addSupp()">Adicionar ao Rastreamento</button>
    </div>

    <div id="supp-list"></div>

    <button class="btn" onclick="resetDay()" style="background: #e57373; color: white;">Finalizar/Resetar Dia</button>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('healthApp')) || { supps: [] };

    function addSupp() {
        const name = document.getElementById('name').value;
        const dose = document.getElementById('dose').value;
        const stock = parseInt(document.getElementById('stock').value);

        if(!name || !dose || !stock) return alert("Preencha todos os campos!");

        state.supps.push({ id: Date.now(), name, dose, stock, taken: false });
        localStorage.setItem('healthApp', JSON.stringify(state));
        render();
    }

    function deleteSupp(id) {
        state.supps = state.supps.filter(s => s.id !== id);
        render();
    }

    function toggleSupp(id) {
        const s = state.supps.find(item => item.id === id);
        if (s.taken) { s.stock += 1; s.taken = false; }
        else { s.stock -= 1; s.taken = true; }
        render();
    }

    function render() {
        const list = document.getElementById('supp-list');
        list.innerHTML = '';

        state.supps.forEach(s => {
            let note = '';
            if(s.name.toLowerCase().includes('ferro')) note = '⚠️ Não tomar com café/leite.';
            if(s.name.toLowerCase().includes('vitamina d')) note = '💡 Tomar após refeição com gordura.';
            if(s.name.toLowerCase().includes('magnésio')) note = '🌙 Ideal antes de dormir.';

            list.innerHTML += `
                <div class="card">
                    <div class="supp-item">
                        <input type="checkbox" class="check-big" ${s.taken ? 'checked' : ''} onchange="toggleSupp(${s.id})">
                        <div style="flex-grow: 1;">
                            <strong>${s.name}</strong> (${s.dose})<br>
                            <small>${note}</small><br>
                            ${s.stock <= 10 ? `<span class="stock-warn">⚠️ Estoque Baixo: ${s.stock} restantes</span>` : `<span>Estoque: ${s.stock}</span>`}
                        </div>
                        <button class="btn-del" onclick="deleteSupp(${s.id})">Excluir</button>
                    </div>
                </div>
            `;
        });
        localStorage.setItem('healthApp', JSON.stringify(state));
    }

    function resetDay() {
        state.supps.forEach(s => s.taken = false);
        render();
    }

    render();
</script>
</body>
</html>
