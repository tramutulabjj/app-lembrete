<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack - Pro</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #50c878; --text: #ffffff; --danger: #e57373; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { color: var(--accent); text-align: center; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .supp-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .btn { background: var(--accent); border: none; padding: 10px; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
        .btn-small { background: #444; color: white; padding: 5px 8px; border-radius: 5px; font-size: 0.75em; border: none; cursor: pointer; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: white; border: 1px solid #444; border-radius: 5px; box-sizing: border-box; }
        .stock-warn { color: var(--danger); font-weight: bold; font-size: 0.8em; }
        #app-content, #calendario-section { display: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .day-box { padding: 8px; background: #333; text-align: center; border-radius: 5px; font-size: 0.8em; }
        .day-done { background: var(--accent); color: black; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo-data">HealthTrack</h1>
    
    <div id="login-section" class="card">
        <button class="btn" id="login-btn">Entrar com Google</button>
    </div>

    <div id="app-content">
        <button class="btn-small" onclick="logout()" style="background:#444">Sair da Conta</button>
        
        <div class="card">
            <h3>Progresso Diário</h3>
            <div style="height: 10px; background: #333; border-radius: 5px; overflow: hidden;">
                <div id="progress-fill" style="height:100%; background:var(--accent); width:0%; transition:0.3s;"></div>
            </div>
            <p id="progress-text" style="text-align:center; margin-top:5px; font-size:0.9em;"></p>
            <button class="btn" onclick="toggleCalendario()">Ver Calendário Mensal</button>
        </div>

        <div id="calendario-section" class="card">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <button class="btn-small" onclick="mudarMes(-1)">Anterior</button>
                <h4 id="mes-titulo"></h4>
                <button class="btn-small" onclick="mudarMes(1)">Próximo</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>

        <div class="card">
            <h3 id="form-title">Adicionar Item</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="name" placeholder="Nome">
            <input type="text" id="dose" placeholder="Dosagem (ex: 2 cp)">
            <input type="time" id="time">
            <input type="number" id="stock" placeholder="Estoque Inicial">
            <button class="btn" onclick="salvarItem()">Salvar Item</button>
        </div>

        <div id="supp-list"></div>

        <div class="card">
            <h3>Diário de Performance</h3>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;"><input type="checkbox" id="caimbra" style="width: 20px; height: 20px;"> Cãibra na Madrugada?</label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;"><input type="checkbox" id="fome" style="width: 20px; height: 20px;"> Vontade de Comer?</label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;"><input type="checkbox" id="fadiga" style="width: 20px; height: 20px;"> Sentiu Fadiga no Treino?</label>
            </div>
            <input type="text" id="nota-dia" placeholder="Nota do dia..." style="margin-top: 15px;">
            <button class="btn" onclick="salvarDiario()">Salvar Diário</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBOy2mwBKNkI7wgl2oWiKa1tgxU188IaoI", authDomain: "app-lembrete1.firebaseapp.com", projectId: "app-lembrete1", storageBucket: "app-lembrete1.firebasestorage.app", messagingSenderId: "811778254789", appId: "1:811778254789:web:c7770b298b49cb82400dac" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let state = { supps: [], diario: {}, historico: {} };
    let mesAtual = new Date();

    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) { currentUser = user; document.getElementById('login-section').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; carregarDados(); }
    });

    async function carregarDados() {
        const docSnap = await getDoc(doc(db, "users", currentUser.uid));
        if(docSnap.exists()) { state = docSnap.data(); render(); }
    }

    async function sync() { await setDoc(doc(db, "users", currentUser.uid), state); render(); }

    window.toggleCalendario = () => {
        const sec = document.getElementById('calendario-section');
        sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
        if(sec.style.display === 'block') renderCalendar();
    };

    window.mudarMes = (delta) => { mesAtual.setMonth(mesAtual.getMonth() + delta); renderCalendar(); };

    function renderCalendar() {
        const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
        document.getElementById('mes-titulo').innerText = mesAtual.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
        const dias = new Date(mesAtual.getFullYear(), mesAtual.getMonth() + 1, 0).getDate();
        for(let i=1; i<=dias; i++) {
            const dataStr = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), i).toLocaleDateString();
            const done = state.historico && state.historico[dataStr] === 100;
            grid.innerHTML += `<div class="day-box ${done ? 'day-done' : ''}">${i}</div>`;
        }
    }

    window.salvarDiario = async () => {
        state.diario = { caimbra: document.getElementById('caimbra').checked, fome: document.getElementById('fome').checked, fadiga: document.getElementById('fadiga').checked, nota: document.getElementById('nota-dia').value };
        await sync(); alert("Diário salvo!");
    };

    window.salvarItem = async () => {
        const id = document.getElementById('edit-id').value;
        const name = document.getElementById('name').value;
        const dose = document.getElementById('dose').value;
        const time = document.getElementById('time').value;
        const stock = parseInt(document.getElementById('stock').value);
        if(!name || !dose || !time || isNaN(stock)) return alert("Preencha tudo!");
        if (id) {
            const index = state.supps.findIndex(s => s.id == id);
            state.supps[index] = { ...state.supps[index], name, dose, time, stock };
        } else {
            state.supps.push({ id: Date.now(), name, dose, time, stock, taken: false });
        }
        document.getElementById('edit-id').value = '';
        document.getElementById('name').value = '';
        document.getElementById('dose').value = '';
        document.getElementById('time').value = '';
        document.getElementById('stock').value = '';
        document.getElementById('form-title').innerText = "Adicionar Item";
        await sync();
    };

    window.editSupp = (id) => {
        const s = state.supps.find(item => item.id == id);
        document.getElementById('edit-id').value = s.id;
        document.getElementById('name').value = s.name;
        document.getElementById('dose').value = s.dose;
        document.getElementById('time').value = s.time;
        document.getElementById('stock').value = s.stock;
        document.getElementById('form-title').innerText = "Editando Item";
    };

    window.deleteSupp = async (id) => { state.supps = state.supps.filter(s => s.id !== id); await sync(); };

    window.toggleSupp = async (id) => {
        const s = state.supps.find(item => item.id == id);
        const doseQtd = parseInt(s.dose) || 1; 
        
        s.taken = !s.taken;
        s.taken ? s.stock -= doseQtd : s.stock += doseQtd;

        if (!state.historico) state.historico = {};
        const total = state.supps.length;
        const tomados = state.supps.filter(i => i.taken).length;
        const porcentagem = total > 0 ? (tomados / total) * 100 : 0;
        
        state.historico[new Date().toLocaleDateString()] = porcentagem;
        render();
        await sync();
    };

    function render() {
        document.getElementById('titulo-data').innerText = new Date().toLocaleDateString();
        const list = document.getElementById('supp-list'); list.innerHTML = '';
        
        const grupos = { manha: [], tarde: [], noite: [] };
        state.supps.forEach(s => {
            const hora = parseInt(s.time.split(':')[0]);
            if (hora < 12) grupos.manha.push(s);
            else if (hora < 18) grupos.tarde.push(s);
            else grupos.noite.push(s);
        });

        const mostrarGrupo = (lista, titulo) => {
            if(lista.length === 0) return;
            list.innerHTML += `<h3 style="color:#50c878; margin-top:20px">${titulo}</h3>`;
            lista.forEach(s => {
                list.innerHTML += `<div class="card"><div class="supp-item"><input type="checkbox" style="width:25px;height:25px" ${s.taken ? 'checked' : ''} onchange="toggleSupp(${s.id})"> <div style="flex-grow:1; margin:0 10px"><strong>${s.name}</strong> (${s.dose})<br><small style="color:var(--accent)">⏰ ${s.time}</small><br><span class="${s.stock <= 10 ? 'stock-warn' : ''}">Estoque: ${s.stock}</span></div> <button class="btn-small" onclick="editSupp(${s.id})">Edit</button> <button class="btn-small" onclick="deleteSupp(${s.id})" style="background:#e57373">X</button></div></div>`;
            });
        };

        mostrarGrupo(grupos.manha, "🌅 Manhã");
        mostrarGrupo(grupos.tarde, "☀️ Tarde");
        mostrarGrupo(grupos.noite, "🌙 Noite");

        const tomados = state.supps.filter(i => i.taken).length;
        const progresso = state.supps.length > 0 ? (tomados / state.supps.length) * 100 : 0;
        document.getElementById('progress-fill').style.width = progresso + '%';
        document.getElementById('progress-text').innerText = `${Math.round(progresso)}% concluído hoje`;
        if(document.getElementById('calendario-section').style.display === 'block') renderCalendar();
    }
</script>
</body>
</html>
