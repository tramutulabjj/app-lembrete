<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HealthTrack Login</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #50c878; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        .btn { background: var(--accent); border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; }
        #app-content { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>HealthTrack</h1>
    <div id="login-section">
        <button class="btn" id="login-btn">Entrar com Google</button>
    </div>

    <div id="app-content">
        <h3 id="user-name"></h3>
        <button class="btn" onclick="logout()" style="background:#555">Sair</button>
        <hr>
        <div id="supp-list"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOy2mwBKNkI7wgl2oWiKa1tgxU188IaoI",
        authDomain: "app-lembrete1.firebaseapp.com",
        projectId: "app-lembrete1",
        storageBucket: "app-lembrete1.firebasestorage.app",
        messagingSenderId: "811778254789",
        appId: "1:811778254789:web:c7770b298b49cb82400dac"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Login
    document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);

    // Logout
    window.logout = () => signOut(auth);

    // Monitorar estado do usuário
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('user-name').innerText = "Olá, " + user.displayName;
            carregarDados(user.uid);
        } else {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    async function carregarDados(uid) {
        const docRef = doc(db, "users", uid);
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            document.getElementById('supp-list').innerHTML = "Seus dados estão carregados!";
        } else {
            document.getElementById('supp-list').innerHTML = "Bem-vindo! Comece adicionando itens.";
        }
    }
</script>
</body>
</html>
