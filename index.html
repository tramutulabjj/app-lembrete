<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack Firebase</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #50c878; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .btn { background: var(--accent); border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; color: black; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>HealthTrack Cloud</h1>
    <div class="card">
        <input type="text" id="name" placeholder="Nome do Suplemento">
        <input type="text" id="dose" placeholder="Dosagem">
        <button class="btn" onclick="adicionar()">Adicionar</button>
    </div>
    <div id="supp-list">Carregando...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOy2mwBKNkI7wgl2oWiKa1tgxU188IaoI",
        authDomain: "app-lembrete1.firebaseapp.com",
        projectId: "app-lembrete1",
        storageBucket: "app-lembrete1.firebasestorage.app",
        messagingSenderId: "811778254789",
        appId: "1:811778254789:web:c7770b298b49cb82400dac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let state = { supps: [] };

    async function carregarDados() {
        const docRef = doc(db, "data", "minhaLista");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            state.supps = docSnap.data().supps;
            render();
        } else {
            document.getElementById('supp-list').innerHTML = "Nenhum suplemento cadastrado.";
        }
    }

    async function salvarDados() {
        await setDoc(doc(db, "data", "minhaLista"), { supps: state.supps });
        render();
    }

    window.adicionar = async () => {
        const name = document.getElementById('name').value;
        const dose = document.getElementById('dose').value;
        state.supps.push({ name, dose });
        await salvarDados();
    };

    function render() {
        const list = document.getElementById('supp-list');
        list.innerHTML = state.supps.map(s => `
            <div class="card"><strong>${s.name}</strong> - ${s.dose}</div>
        `).join('');
    }

    carregarDados();
</script>
</body>
</html>
